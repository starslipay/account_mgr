apiVersion: apps/v1
kind: Deployment
metadata:
  name: account-mgr
  namespace: pay-ns
  labels:
    app: account-mgr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: account-mgr
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: account-mgr
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      nodeSelector:
        node-type: business-worker
      containers:
      - name: account-mgr
        image: account_mgr:v1.0.0
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
          name: rpc
        env:
        - name: TZ
          value: "Asia/Shanghai"
        - name: ETCD_HOST
          value: "etcd-0.etcd.pay-ns.svc.cluster.local:2379,etcd-1.etcd.pay-ns.svc.cluster.local:2379,etcd-2.etcd.pay-ns.svc.cluster.local:2379"
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        livenessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - account-mgr
              topologyKey: kubernetes.io/hostname
      restartPolicy: Always

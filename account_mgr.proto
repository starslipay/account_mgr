syntax = "proto3";

package account_mgr;
// 相对路径;包名
option go_package = "./account_mgr_pb";

// 创建账户Req
message CreateAccountReq {
    int64 uid = 1;
    string user_id = 2;
    int32 cur_type = 3;
}

// 创建账户Rsp
message CreateAccountRsp {
    int64 uid = 1;
    string user_id = 2;
    bool is_repeat = 3;
}

// 获取账户余额Req
message GetUserBalanceInfoReq {
    int64 uid = 1;
    int32 qry_mode = 2;  // 1-查从库 2-查主库
}

// 获取账户余额Rsp
message GetUserBalanceInfoRsp {
    int64 uid = 1;
    string user_id = 2;
    int64 balance = 3;
    int32 cur_type = 4;
}

// 获取账户流水Req
message GetUserFlowReq {
    int64 uid = 1;
    int32 offset = 2;  // 偏移量
    int32 limit = 3;  // 限制数量
}

// 获取账户流水Rsp
message GetUserFlowRsp {
    int64 uid = 1;
    string user_id = 2;
    int32 next_offset = 3;  // 下一页偏移量
    int32 end_flag = 4;  // 是否是最后一页
    repeated UserFlow UserFlowList = 5;  // 账户流水列表
}

message UserFlow {
    string transaction_id = 1;
    string user_id = 2;
    string counterparty_user_id = 3;
    int32 inout_type = 4;
    int32 biz_type = 5;
    int64 balance = 7;
    int64 amount = 6;
    string desc = 8;
    string create_time = 9;
}

message Bank2CReq {
    string transaction_id = 1;
    string user_id = 2;
    int64 uid = 3;
    int32 bank_type = 4;
    int64 amount = 5;
    int32 cur_type = 6;
    string desc = 7;
}

message Bank2CRsp {
    string transaction_id = 1;
    string user_id = 2;
}

// 转账Req
message C2cReq {
    string transaction_id = 1;
    int64 buyer_uid = 2;
    string buyer_user_id = 3;
    int64 seller_uid = 4;
    string seller_user_id = 5;
    int64 amount = 6;
    int32 cur_type = 7;
    string desc = 8;
}

// 转账Rsp
message C2cRsp {
    string transaction_id = 1;
    int64 buyer_uid = 2;
    string buyer_user_id = 3;
    int64 seller_uid = 4;
    string seller_user_id = 5;
    string transfer_time = 6;
    int32 is_repeat = 7;
}

service AccountMgr {
    rpc CreateAccount(CreateAccountReq) returns (CreateAccountRsp);
    rpc GetUserBalanceInfo(GetUserBalanceInfoReq) returns (GetUserBalanceInfoRsp);

    rpc GetUserFlow(GetUserFlowReq) returns (GetUserFlowRsp);

    rpc Bank2C(Bank2CReq) returns (Bank2CRsp);
    rpc C2cLocal(C2cReq) returns (C2cRsp);  // 本地事务转账
    rpc C2cStrong(C2cReq) returns (C2cRsp);  // 分布式强一致性转账
    rpc C2cFinal(C2cReq) returns (C2cRsp);  // 分布式最终一致性转账
}

/*
生成项目框架
goctl rpc protoc account_mgr.proto --go_out=. --go-grpc_out=. --zrpc_out=.
*/